name: Build and publish Docker image (Docker Hub)
on:
  push:
    branches:
      - prod
  pull_request:
    branches:
      - prod

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push (github_app target example)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile
          target: github_app
          push: $${{ github.ref == 'refs/heads/prod' }}
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dvmn-agent:prod
            ${{ secrets.DOCKERHUB_USERNAME }}/dvmn-agent:latest